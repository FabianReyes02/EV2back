name: Build and Push MS-Ventas to DockerHub

on:
  push:
    branches:
      - deploy
    paths:
      # Solo se activa si hay cambios en la carpeta de Ventas o en este workflow
      - 'EV2back/back-Ventas_SpringBoot/**'
      - '.github/workflows/build-ventas.yml'

env:
  REGISTRY: docker.io
  IMAGE_NAME: ms-ventas

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push MS-Ventas
        # Se agrega el ID para que el siguiente paso pueda leer los outputs
        id: docker_build 
        uses: docker/build-push-action@v5
        with:
          context: ./EV2back/back-Ventas_SpringBoot
          file: ./EV2back/back-Ventas_SpringBoot/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        # Ahora el ID coincide con el paso anterior
        run: echo "Digest de la imagen: ${{ steps.docker_build.outputs.digest }}"
